services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: planagent
      POSTGRES_USER: planagent
      POSTGRES_PASSWORD: planagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: planagent
      MINIO_ROOT_PASSWORD: planagent123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_EVENT_BUS_BACKEND: redis
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent123
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  ingest-worker:
    build:
      context: .
    command: ["planagent-worker", "ingest-worker", "--loop"]
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_EVENT_BUS_BACKEND: redis
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent123
    depends_on:
      - postgres
      - redis

  simulation-worker:
    build:
      context: .
    command: ["planagent-worker", "simulation-worker", "--loop"]
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_EVENT_BUS_BACKEND: redis
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent123
    depends_on:
      - postgres
      - redis

  report-worker:
    build:
      context: .
    command: ["planagent-worker", "report-worker", "--loop"]
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_EVENT_BUS_BACKEND: redis
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent123
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
  minio-data:
