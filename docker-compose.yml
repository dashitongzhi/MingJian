# PlanAgent Docker Compose — Full stack with workers
# Usage: docker compose up -d

version: "3.9"

services:
  # ── Database ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: planagent-postgres
    environment:
      POSTGRES_USER: planagent
      POSTGRES_PASSWORD: planagent
      POSTGRES_DB: planagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: planagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-api
    command: uvicorn planagent.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports

  # ── Workers ────────────────────────────────────────────────
  worker-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-ingest
    command: python -m planagent.worker_cli ingest-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-knowledge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-knowledge
    command: python -m planagent.worker_cli knowledge-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-simulation
    command: python -m planagent.worker_cli simulation-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-report:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-report
    command: python -m planagent.worker_cli report-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-watch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-watch
    command: python -m planagent.worker_cli watch-ingest-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-strategic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-strategic
    command: python -m planagent.worker_cli strategic-watch-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-prediction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-prediction
    command: python -m planagent.worker_cli prediction-revision-worker --loop
    env_file: .env
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
