# PlanAgent Docker Compose — Full stack with workers
# Usage: docker compose up -d

version: "3.9"

services:
  # ── Database ───────────────────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
    container_name: planagent-postgres
    environment:
      POSTGRES_USER: planagent
      POSTGRES_PASSWORD: planagent
      POSTGRES_DB: planagent
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: planagent-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Object Storage ────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2026-05-13T14-27-54Z
    container_name: planagent-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: planagent
      MINIO_ROOT_PASSWORD: planagent-minio-secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-api
    command: uvicorn planagent.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent-minio-secret
      PLANAGENT_SOURCE_SNAPSHOT_BACKEND: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports

  frontend:
    image: node:22-alpine
    container_name: planagent-frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend-v2:/app
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # ── Workers ────────────────────────────────────────────────
  worker-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planagent-worker-ingest
    command: python -m planagent.worker_cli ingest-worker --loop
    env_file:
      - path: .env
        required: false
    environment:
      PLANAGENT_DATABASE_URL: postgresql+psycopg://planagent:planagent@postgres:5432/planagent
      PLANAGENT_REDIS_URL: redis://redis:6379/0
      PLANAGENT_MINIO_ENDPOINT: minio:9000
      PLANAGENT_MINIO_ACCESS_KEY: planagent
      PLANAGENT_MINIO_SECRET_KEY: planagent-minio-secret
      PLANAGENT_SOURCE_SNAPSHOT_BACKEND: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker-knowledge:
