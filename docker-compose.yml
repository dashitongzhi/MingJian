x-env-common: &env-common
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  NO_PROXY: ""
  no_proxy: ""
  PLANAGENT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-planagent}:${POSTGRES_PASSWORD:-planagent}@postgres:5432/${POSTGRES_DB:-planagent}
  PLANAGENT_REDIS_URL: redis://redis:6379/0
  PLANAGENT_EVENT_BUS_BACKEND: redis
  PLANAGENT_MINIO_ENDPOINT: minio:9000
  PLANAGENT_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-planagent}
  PLANAGENT_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-planagent123}

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-planagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-planagent}
      POSTGRES_DB: ${POSTGRES_DB:-planagent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planagent} -d ${POSTGRES_DB:-planagent}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-planagent}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-planagent123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: planagent-api:latest
    build:
      context: .
      target: api
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment: *env-common
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: planagent-api:latest
    build:
      context: .
      target: api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment: *env-common
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./rules:/app/rules:ro

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file:
      - .env
    environment: *env-common
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./rules:/app/rules:ro

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
