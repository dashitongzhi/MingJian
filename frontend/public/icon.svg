<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#grad1)"/>
  <!-- 明 character stylized -->
  <g transform="translate(128, 128)" fill="white">
    <!-- Sun radical (日) -->
    <rect x="40" y="40" width="80" height="80" rx="8" fill="none" stroke="white" stroke-width="8"/>
    <!-- Moon radical (月) -->
    <rect x="140" y="40" width="80" height="80" rx="8" fill="none" stroke="white" stroke-width="8"/>
    <!-- Connecting line -->
    <line x1="80" y1="140" x2="80" y2="220" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="180" y1="140" x2="180" y2="220" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Mirror/Discern element (鉴) -->
    <circle cx="130" cy="180" r="40" fill="none" stroke="white" stroke-width="8"/>
    <circle cx="130" cy="180" r="20" fill="white"/>
    <!-- Reflection lines -->
    <line x1="90" y1="140" x2="110" y2="160" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="170" y1="140" x2="150" y2="160" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="90" y1="220" x2="110" y2="200" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="170" y1="220" x2="150" y2="200" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- AI circuit pattern -->
  <g transform="translate(256, 320)" fill="none" stroke="white" stroke-width="4" opacity="0.6">
    <circle cx="0" cy="0" r="8" fill="white"/>
    <line x1="8" y1="0" x2="40" y2="0"/>
    <circle cx="48" cy="0" r="8" fill="white"/>
    <line x1="0" y1="8" x2="0" y2="40"/>
    <circle cx="0" cy="48" r="8" fill="white"/>
    <line x1="-8" y1="0" x2="-40" y2="0"/>
    <circle cx="-48" cy="0" r="8" fill="white"/>
    <line x1="0" y1="-8" x2="0" y2="-40"/>
    <circle cx="0" cy="-48" r="8" fill="white"/>
  </g>
</svg>
