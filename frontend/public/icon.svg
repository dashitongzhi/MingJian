<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#gradient)"/>
  <g transform="translate(20, 15)">
    <!-- Letter P formed by connected nodes -->
    <circle cx="15" cy="15" r="6" fill="white" opacity="0.9"/>
    <circle cx="35" cy="15" r="6" fill="white" opacity="0.9"/>
    <circle cx="55" cy="15" r="6" fill="white" opacity="0.9"/>
    <circle cx="15" cy="35" r="6" fill="white" opacity="0.9"/>
    <circle cx="35" cy="35" r="6" fill="white" opacity="0.9"/>
    <circle cx="55" cy="35" r="6" fill="white" opacity="0.9"/>
    <circle cx="15" cy="55" r="6" fill="white" opacity="0.9"/>
    <circle cx="35" cy="55" r="6" fill="white" opacity="0.9"/>
    <circle cx="55" cy="55" r="6" fill="white" opacity="0.9"/>
    <!-- Connections -->
    <line x1="15" y1="15" x2="35" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="15" x2="55" y2="15" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="15" y1="15" x2="15" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="15" y1="35" x2="15" y2="55" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="15" x2="35" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="35" x2="35" y2="55" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="55" y1="15" x2="55" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="55" y1="35" x2="55" y2="55" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="15" y1="35" x2="35" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="35" x2="55" y2="35" stroke="white" stroke-width="2" opacity="0.7"/>
    <!-- Central node highlighted -->
    <circle cx="35" cy="35" r="8" fill="white" opacity="1"/>
    <circle cx="35" cy="35" r="4" fill="#4F46E5"/>
  </g>
</svg>