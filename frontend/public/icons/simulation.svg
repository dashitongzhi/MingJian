<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="simulation" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6" />
      <stop offset="100%" style="stop-color:#EC4899" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#simulation)" opacity="0.1"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#simulation)" stroke-width="3"/>
  <!-- Branching paths -->
  <line x1="50" y1="25" x2="50" y2="45" stroke="url(#simulation)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="45" x2="30" y2="65" stroke="url(#simulation)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="45" x2="70" y2="65" stroke="url(#simulation)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="65" x2="20" y2="80" stroke="url(#simulation)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="30" y1="65" x2="40" y2="80" stroke="url(#simulation)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="70" y1="65" x2="60" y2="80" stroke="url(#simulation)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="70" y1="65" x2="80" y2="80" stroke="url(#simulation)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Nodes -->
  <circle cx="50" cy="25" r="5" fill="url(#simulation)"/>
  <circle cx="50" cy="45" r="5" fill="url(#simulation)"/>
  <circle cx="30" cy="65" r="5" fill="url(#simulation)"/>
  <circle cx="70" cy="65" r="5" fill="url(#simulation)"/>
</svg>
