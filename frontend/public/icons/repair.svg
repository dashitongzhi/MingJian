<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="repair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#repair)" opacity="0.1"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#repair)" stroke-width="3"/>
  <!-- Circular arrows (self-repair) -->
  <path d="M50 25 A25 25 0 0 1 75 50" fill="none" stroke="url(#repair)" stroke-width="3" stroke-linecap="round"/>
  <path d="M75 50 A25 25 0 0 1 50 75" fill="none" stroke="url(#repair)" stroke-width="3" stroke-linecap="round"/>
  <path d="M50 75 A25 25 0 0 1 25 50" fill="none" stroke="url(#repair)" stroke-width="3" stroke-linecap="round"/>
  <path d="M25 50 A25 25 0 0 1 50 25" fill="none" stroke="url(#repair)" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow heads -->
  <polygon points="75,45 80,50 75,55" fill="url(#repair)"/>
  <polygon points="55,75 50,80 45,75" fill="url(#repair)"/>
  <polygon points="25,55 20,50 25,45" fill="url(#repair)"/>
  <polygon points="45,25 50,20 55,25" fill="url(#repair)"/>
  <!-- Center checkmark -->
  <polyline points="40,50 47,57 62,42" fill="none" stroke="url(#repair)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
