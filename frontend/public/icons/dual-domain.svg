<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="corporate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6" />
      <stop offset="100%" style="stop-color:#1D4ED8" />
    </linearGradient>
    <linearGradient id="military" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981" />
      <stop offset="100%" style="stop-color:#059669" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="45" fill="url(#corporate)" opacity="0.1"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#corporate)" stroke-width="3"/>
  <!-- Corporate side (left) -->
  <g transform="translate(25, 30)">
    <rect x="0" y="10" width="20" height="30" rx="2" fill="none" stroke="url(#corporate)" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="10" stroke="url(#corporate)" stroke-width="2"/>
    <circle cx="10" cy="0" r="4" fill="url(#corporate)"/>
    <line x1="5" y1="20" x2="15" y2="20" stroke="url(#corporate)" stroke-width="1.5"/>
    <line x1="5" y1="25" x2="15" y2="25" stroke="url(#corporate)" stroke-width="1.5"/>
    <line x1="5" y1="30" x2="12" y2="30" stroke="url(#corporate)" stroke-width="1.5"/>
  </g>
  <!-- Military side (right) -->
  <g transform="translate(55, 30)">
    <polygon points="10,0 20,15 10,30 0,15" fill="none" stroke="url(#military)" stroke-width="2"/>
    <line x1="10" y1="0" x2="10" y2="30" stroke="url(#military)" stroke-width="1.5"/>
    <line x1="0" y1="15" x2="20" y2="15" stroke="url(#military)" stroke-width="1.5"/>
  </g>
  <!-- Divider -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="url(#corporate)" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Integration symbol -->
  <circle cx="50" cy="70" r="8" fill="none" stroke="url(#corporate)" stroke-width="2"/>
  <line x1="50" y1="62" x2="50" y2="78" stroke="url(#corporate)" stroke-width="2"/>
  <line x1="42" y1="70" x2="58" y2="70" stroke="url(#corporate)" stroke-width="2"/>
</svg>
