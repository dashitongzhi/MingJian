  <circle cx="42" cy="42" r="12" fill="none" stroke="url(#evidence)" stroke-width="3"/>
  <line x1="51" y1="51" x2="62" y2="62" stroke="url(#evidence)" stroke-width="3" stroke-linecap="round"/>
  <!-- Evidence lines -->
  <line x1="30" y1="70" x2="50" y2="70" stroke="url(#evidence)" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="76" x2="45" y2="76" stroke="url(#evidence)" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="82" x2="40" y2="82" stroke="url(#evidence)" stroke-width="2" stroke-linecap="round"/>
