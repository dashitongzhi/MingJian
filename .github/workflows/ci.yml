name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -e '.[dev]' --system
      - name: Lint
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      - name: Type check
        run: mypy src/planagent/ --ignore-missing-imports
      - name: Run unit and Community contract tests
        run: |
          python -m pytest \
            tests/unit/ \
            tests/test_community_access.py \
            tests/test_community_feature_boundaries.py \
            tests/test_strategic_assistant.py \
            tests/test_new_features.py \
            -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Type check
        run: npx tsc -b
      - name: Build
        run: npx vite build
