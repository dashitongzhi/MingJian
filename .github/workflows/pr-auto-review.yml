# PR Auto-Review — 使用Hermes Agent自动审查PR
# 当PR创建或更新时，自动触发代码审查

name: PR Auto Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

permissions:
  pull-requests: write

jobs:
  auto-review:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - name: Analyze changes and post review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedFiles = files.map((file) => file.filename);
            const additions = files.reduce((sum, file) => sum + file.additions, 0);
            const deletions = files.reduce((sum, file) => sum + file.deletions, 0);

            const issues = [];

            // Check for large PRs
            if (additions + deletions > 500) {
              issues.push('⚠️ **大型PR** — 考虑拆分为更小的PR');
            }

            // Check for test coverage
            const hasTestChanges = changedFiles.some(f => f.includes('test'));
            const hasSourceChanges = changedFiles.some(f => f.includes('src/'));
            if (hasSourceChanges && !hasTestChanges) {
              issues.push('⚠️ **缺少测试** — 源代码变更但没有测试更新');
            }

            // Check for config changes
            const hasConfigChanges = changedFiles.some(f =>
              f.includes('config') || f.includes('.env') || f.includes('docker-compose'));
            if (hasConfigChanges) {
              issues.push('⚠️ **配置变更** — 请确认环境变量和部署配置已更新');
            }

            // Check for migration changes
            const hasMigrationChanges = changedFiles.some(f => f.includes('migration'));
            if (hasMigrationChanges) {
              issues.push('⚠️ **数据库迁移** — 请确认迁移脚本已测试');
            }

            // Check for security-sensitive changes
            const hasSecurityChanges = changedFiles.some(f =>
              f.includes('auth') || f.includes('security') || f.includes('token'));
            if (hasSecurityChanges) {
              issues.push('🔒 **安全相关变更** — 请特别注意安全审查');
            }

            // Module detection
            const modules = new Set();
            if (changedFiles.some(f => f.includes('debate'))) modules.add('辩论系统');
            if (changedFiles.some(f => f.includes('simulation'))) modules.add('推演引擎');
            if (changedFiles.some(f => f.includes('worker'))) modules.add('Worker');
            if (changedFiles.some(f => f.includes('api/routes'))) modules.add('API路由');
            if (changedFiles.some(f => f.includes('frontend'))) modules.add('前端');

            if (issues.length === 0) {
              core.notice(`No heuristic review warnings for PR #${pr.number}.`);
              return;
            }

            let body = `## 🤖 自动审查报告\n\n`;
            body += `**PR规模**: +${additions} / -${deletions} 行\n`;
            if (modules.size > 0) {
              body += `**涉及模块**: ${Array.from(modules).join(', ')}\n`;
            }
            body += `\n### ⚠️ 注意事项\n\n`;
            body += issues.join('\n');
            body += `\n\n---\n`;
            body += `*此审查由GitHub Actions自动生成，请人工确认*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
