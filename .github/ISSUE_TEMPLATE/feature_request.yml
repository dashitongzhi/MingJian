name: Feature Request
description: Suggest a new feature for MingJian
title: '[Feature] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        We love feature ideas! Please describe what you'd like to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Debate System
        - Simulation Engine
        - Data Sources
        - Agent System
        - Frontend UI
        - API
        - Performance
        - Other
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
