name: Bug Report
description: Report a bug to help us improve MingJian
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant log output
      render: shell
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend API
        - Frontend UI
        - Debate System
        - Simulation Engine
        - Data Pipeline
        - Configuration
        - Docker/Deployment
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MingJian Version
      placeholder: e.g. v0.1.0
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Docker
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Python version, Node version, database, etc.
      placeholder: |
        Python: 3.12
        Node: 20
        Database: SQLite/PostgreSQL
